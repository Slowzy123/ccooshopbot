services:
  - type: worker
    name: telegram-bot
    runtime: python
    plan: free
    region: frankfurt

    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py

    # ⚠️ Pas de disque persistant sur le plan gratuit Render.
    # La base SQLite est stockée dans /tmp — elle persiste entre les redémarrages
    # mais est réinitialisée à chaque redéploiement du code.
    # → Pour une persistance totale, utilisez Railway.app (gratuit, disque inclus)

    envVars:
      - key: TOKEN
        sync: false

      - key: ADMIN_IDS
        sync: false

      - key: DB_PATH
        value: /tmp/boutique.db

      - key: PYTHON_VERSION
        value: 3.11.0
