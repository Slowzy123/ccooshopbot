services:
  - type: worker          # Background Worker = processus permanent (parfait pour un bot Telegram en polling)
    name: telegram-bot
    runtime: python
    plan: free            # Plan gratuit Render
    region: frankfurt     # Région Europe (latence réduite)

    # Commande exécutée une seule fois avant le démarrage (installe les dépendances)
    buildCommand: pip install -r requirements.txt

    # Commande de démarrage du bot
    startCommand: python telegram_bot.py

    # Disque persistant pour que la base SQLite survive aux redémarrages
    disk:
      name: boutique-db
      mountPath: /data      # Chemin où sera stocké le fichier boutique.db
      sizeGB: 1             # 1 Go gratuit

    # Variables d'environnement (secrets saisis manuellement dans le dashboard Render)
    envVars:
      - key: TOKEN
        sync: false           # ← Valeur secrète à saisir dans le dashboard Render

      - key: ADMIN_IDS
        sync: false           # ← Format : "123456789,987654321" (IDs séparés par virgule)

      - key: DB_PATH
        value: /data/boutique.db   # Chemin fixe sur le disque persistant

      - key: PYTHON_VERSION
        value: 3.11.0
