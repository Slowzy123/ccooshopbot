<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Mon Panier</title>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <h2 id="welcome">Bonjour !</h2>
    <div id="cart">
        <p>Produit A - 10€</p>
        <button onclick="ajouterAuPanier('Produit A', 10)">Ajouter au panier</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre la Mini App en grand

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome').innerText = `Bonjour ${user.first_name} !`;
        }

        let panier = [];

        function ajouterAuPanier(nom, prix) {
            panier.push({nom, prix});
            tg.MainButton.setText(`PAYER (${panier.length} articles)`).show();
        }

        // Quand on clique sur le gros bouton de Telegram
        tg.onEvent('mainButtonClicked', async () => {
            const response = await fetch('/api/commander', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    initData: tg.initData,
                    panier: panier
                })
            });
            const result = await response.json();
            alert(result.message);
            tg.close();
        });
    </script>
</body>
</html>
